{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row">
    <!-- left sidebar -->
    <!-- Load the sidebar here -->

    {% include 'dashboard/sidebar.html' %}

    <!--  -->
    <div class="col-md-9">
        <h2>Add New Categories</h2>
        <form action="{% url 'add_category' %}" method="POST" style="width: 500px;">

            {% csrf_token %}
            {{ form | crispy }}

            <button type="submit" class="btn btn-warning text-center">Add</button>
        </form>

    </div>

</div>

{% endblock %}
